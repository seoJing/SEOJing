<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="640" viewBox="0 0 1120 640" role="img" aria-labelledby="title desc">
  <title id="title">제네릭과 조건부 타입의 경계</title>
  <desc id="desc">구체 타입에서 제네릭으로, 다시 조건부 타입과 템플릿 리터럴 타입으로 이어지는 타입 설계 흐름을 보여주는 다이어그램</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fdfdfb"/>
      <stop offset="1" stop-color="#f0f9ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .title{font:700 28px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#0f172a}
      .body{font:500 21px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#334155}
      .small{font:500 18px system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#64748b}
      .code{font:600 20px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#1e293b}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:24;filter:url(#shadow)}
      .blue{fill:#eff6ff;stroke:#60a5fa;stroke-width:2;rx:22;filter:url(#shadow)}
      .green{fill:#ecfdf5;stroke:#34d399;stroke-width:2;rx:22;filter:url(#shadow)}
      .purple{fill:#f5f3ff;stroke:#a78bfa;stroke-width:2;rx:22;filter:url(#shadow)}
      .warn{fill:#fff7ed;stroke:#fb923c;stroke-width:2;rx:22;filter:url(#shadow)}
      .arrow{stroke:#475569;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1120" height="640" fill="url(#bg)"/>
  <text x="64" y="72" class="title">타입 설계는 “더 똑똑한 타입”보다 “검증 가능한 경계”가 먼저다</text>
  <text x="64" y="112" class="body">Item 49–54: coverage, generic, conditional/template literal type를 리뷰 감각으로 연결하기.</text>

  <rect x="70" y="175" width="240" height="130" class="box"/>
  <text x="98" y="218" class="code">unknown input</text>
  <text x="98" y="256" class="body">외부 경계</text>
  <text x="98" y="284" class="small">검증 없이는 내부 타입 아님</text>

  <rect x="405" y="175" width="270" height="130" class="blue"/>
  <text x="435" y="218" class="code">function map&lt;T,U&gt;</text>
  <text x="435" y="256" class="body">관계 보존 제네릭</text>
  <text x="435" y="284" class="small">입력과 출력의 연결을 표현</text>

  <rect x="770" y="175" width="280" height="130" class="purple"/>
  <text x="800" y="218" class="code">T extends ... ? A : B</text>
  <text x="800" y="256" class="body">조건부/템플릿 타입</text>
  <text x="800" y="284" class="small">규칙을 타입으로 계산</text>

  <path d="M315 240 H395" class="arrow"/>
  <path d="M680 240 H760" class="arrow"/>

  <rect x="110" y="400" width="420" height="130" class="green"/>
  <text x="140" y="443" class="code">type Route = `/users/${string}`</text>
  <text x="140" y="481" class="body">문자열 규칙을 좁힘</text>
  <text x="140" y="509" class="small">API path, event name, key prefix 같은 반복 규칙에 적합</text>

  <rect x="615" y="400" width="395" height="130" class="warn"/>
  <text x="645" y="443" class="code">type Everything&lt;T&gt; = ...</text>
  <text x="645" y="481" class="body">과한 타입 계산</text>
  <text x="645" y="509" class="small">디버깅/컴파일 비용이 구현보다 커지면 위험</text>

  <path d="M880 310 C800 350 670 368 500 398" class="arrow"/>
  <path d="M915 310 C935 350 925 372 850 398" class="arrow"/>

  <text x="70" y="585" class="small">리뷰 질문: “이 타입은 런타임 규칙을 더 명확히 보여 주는가, 아니면 타입 퍼즐만 늘렸는가?”</text>
</svg>
