<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">TypeScript valid state and API boundary diagram</title>
  <desc id="desc">A discriminated union keeps UI request states valid while unknown API data is validated before entering the typed app model.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7ed"/>
      <stop offset="1" stop-color="#f0f9ff"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="960" height="520" rx="28" fill="url(#bg)"/>
  <text x="48" y="62" font-family="ui-sans-serif, system-ui, -apple-system" font-size="28" font-weight="700" fill="#0f172a">make invalid states unrepresentable</text>
  <text x="48" y="96" font-family="ui-sans-serif, system-ui, -apple-system" font-size="16" fill="#475569">외부 데이터는 unknown에서 시작하고, 앱 내부 상태는 판별 유니온으로 좁혀 들어온다.</text>

  <rect x="54" y="150" width="230" height="206" rx="22" fill="#ffffff" stroke="#fdba74" stroke-width="2"/>
  <text x="80" y="188" font-family="ui-sans-serif, system-ui, -apple-system" font-size="18" font-weight="700" fill="#9a3412">API response</text>
  <rect x="80" y="218" width="178" height="48" rx="12" fill="#ffedd5"/>
  <text x="101" y="248" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#9a3412">unknown</text>
  <text x="80" y="304" font-family="ui-sans-serif, system-ui, -apple-system" font-size="15" fill="#64748b">타입 선언만 붙여서</text>
  <text x="80" y="326" font-family="ui-sans-serif, system-ui, -apple-system" font-size="15" fill="#64748b">검증을 생략하면 경계가 샌다.</text>

  <rect x="350" y="128" width="260" height="250" rx="22" fill="#ffffff" stroke="#38bdf8" stroke-width="2"/>
  <text x="376" y="166" font-family="ui-sans-serif, system-ui, -apple-system" font-size="18" font-weight="700" fill="#075985">validation / parsing</text>
  <rect x="380" y="198" width="200" height="42" rx="12" fill="#e0f2fe"/>
  <text x="402" y="224" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#0369a1">has id?</text>
  <rect x="380" y="254" width="200" height="42" rx="12" fill="#e0f2fe"/>
  <text x="402" y="280" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#0369a1">has name?</text>
  <rect x="380" y="310" width="200" height="42" rx="12" fill="#e0f2fe"/>
  <text x="402" y="336" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" fill="#0369a1">nullable?</text>

  <rect x="676" y="114" width="230" height="292" rx="22" fill="#ffffff" stroke="#a7f3d0" stroke-width="2"/>
  <text x="704" y="152" font-family="ui-sans-serif, system-ui, -apple-system" font-size="18" font-weight="700" fill="#047857">UI RequestState</text>
  <rect x="704" y="180" width="174" height="42" rx="12" fill="#dcfce7"/>
  <text x="725" y="206" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#166534">{status:'loading'}</text>
  <rect x="704" y="236" width="174" height="42" rx="12" fill="#fee2e2"/>
  <text x="725" y="262" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#991b1b">{status:'error'}</text>
  <rect x="704" y="292" width="174" height="42" rx="12" fill="#dbeafe"/>
  <text x="725" y="318" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#1d4ed8">{status:'success'}</text>
  <text x="704" y="368" font-family="ui-sans-serif, system-ui, -apple-system" font-size="15" fill="#64748b">loading + data 같은</text>
  <text x="704" y="390" font-family="ui-sans-serif, system-ui, -apple-system" font-size="15" fill="#64748b">불가능한 조합을 타입에서 제거</text>

  <path d="M284 252 C316 252 318 252 350 252" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M610 252 C642 252 644 252 676 252" stroke="#334155" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <rect x="76" y="442" width="808" height="42" rx="14" fill="#0f172a" opacity="0.92"/>
  <text x="100" y="469" font-family="ui-sans-serif, system-ui, -apple-system" font-size="16" fill="#f8fafc">리뷰 질문: 이 타입은 실제로 나올 수 없는 UI 상태를 만들 수 없게 막고 있는가?</text>
</svg>
