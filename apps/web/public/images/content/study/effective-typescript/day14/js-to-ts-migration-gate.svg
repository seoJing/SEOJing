<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript에서 TypeScript로 점진적 마이그레이션</title>
  <desc id="desc">JS 현대화, ts-check, JSDoc, allowJs, module-by-module migration, noImplicitAny로 이어지는 TypeScript 마이그레이션 단계</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#eef2ff"/></linearGradient><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#1f2937" flood-opacity=".16"/></filter><style>.title{font:700 34px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#172033}.sub{font:500 18px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#64748b}.step{fill:rgba(255,255,255,.86);stroke:#cbd5e1;stroke-width:1.5;filter:url(#shadow)}.h{font:700 22px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.t{font:600 16px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#475569}.code{font:600 15px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#1e293b}.line{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}.gate{fill:#ecfdf5;stroke:#34d399;stroke-width:2}.warn{fill:#fff1f2;stroke:#fb7185;stroke-width:2}</style></defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <text x="68" y="76" class="title">마이그레이션은 변환이 아니라 신뢰 경계 좁히기다</text>
  <text x="68" y="110" class="sub">modern JS → @ts-check/JSDoc → allowJs → module migration → noImplicitAny</text>
  <rect x="80" y="182" width="190" height="150" rx="22" class="step"/><text x="110" y="226" class="h">1. JS 현대화</text><text x="110" y="262" class="code">let/const</text><text x="110" y="288" class="code">ESM</text><text x="110" y="314" class="t">런타임 의미 정리</text>
  <rect x="320" y="182" width="190" height="150" rx="22" class="step"/><text x="350" y="226" class="h">2. @ts-check</text><text x="350" y="262" class="code">@ts-check</text><text x="350" y="288" class="code">JSDoc</text><text x="350" y="314" class="t">JS에서 먼저 경고</text>
  <rect x="560" y="182" width="190" height="150" rx="22" class="step"/><text x="590" y="226" class="h">3. allowJs</text><text x="590" y="262" class="code">js + ts</text><text x="590" y="288" class="code">mixed build</text><text x="590" y="314" class="t">혼합 상태 관리</text>
  <rect x="800" y="182" width="190" height="150" rx="22" class="step"/><text x="830" y="226" class="h">4. 모듈별 전환</text><text x="830" y="262" class="code">one boundary</text><text x="830" y="288" class="code">at a time</text><text x="830" y="314" class="t">입출력 계약부터</text>
  <path class="line" d="M270 257 H320"/><path class="line" d="M510 257 H560"/><path class="line" d="M750 257 H800"/>
  <rect x="248" y="444" width="300" height="132" rx="24" class="gate"/><text x="282" y="486" class="h">품질 게이트</text><text x="282" y="522" class="code">noImplicitAny</text><text x="282" y="550" class="t">새로운 any 유입을 막는다</text>
  <rect x="650" y="444" width="330" height="132" rx="24" class="warn"/><text x="684" y="486" class="h">리뷰 질문</text><text x="684" y="522" class="t">타입만 바뀌고 런타임 의미는 그대로인가?</text><text x="684" y="550" class="t">AI가 as/any로 비용을 숨기지 않았나?</text>
  <path class="line" d="M895 332 C850 404 702 456 548 500"/>
</svg>
