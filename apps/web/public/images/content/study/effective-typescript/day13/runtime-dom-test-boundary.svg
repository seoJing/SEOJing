<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">런타임 값, DOM 환경, 테스트, 컴파일러 성능 경계</title>
  <desc id="desc">TypeScript 타입이 사라진 뒤 런타임 검증, DOM 환경, 테스트, 컴파일러 성능으로 이어지는 리뷰 경계 다이어그램</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef6ff"/><stop offset="1" stop-color="#f8efe3"/></linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.15"/></filter>
    <style>
      .title{font:700 34px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#172033}.sub{font:500 18px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#64748b}.card{fill:rgba(255,255,255,.86);stroke:#cbd5e1;stroke-width:1.5;filter:url(#shadow)}.h{font:700 23px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.t{font:600 17px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#475569}.s{font:500 15px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#64748b}.code{font:600 16px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#1e293b}.line{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}.warn{fill:#fff7ed;stroke:#fb923c;stroke-width:2}.ok{fill:#ecfdf5;stroke:#34d399;stroke-width:2}.env{fill:#eff6ff;stroke:#60a5fa;stroke-width:2}.perf{fill:#f5f3ff;stroke:#a78bfa;stroke-width:2}
    </style>
  </defs>
  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>
  <text x="70" y="76" class="title">타입은 사라지고, 경계는 남는다</text>
  <text x="70" y="110" class="sub">runtime validation · DOM environment · test · compiler performance</text>
  <rect x="82" y="174" width="244" height="178" rx="24" class="card"/>
  <text x="112" y="218" class="h">외부 값</text><text x="112" y="254" class="code">unknown JSON</text><text x="112" y="284" class="t">타입 정보 없음</text><text x="112" y="314" class="s">API · localStorage · postMessage</text>
  <rect x="392" y="174" width="244" height="178" rx="24" class="warn"/>
  <text x="422" y="218" class="h">런타임 검증</text><text x="422" y="254" class="code">isUser(value)</text><text x="422" y="284" class="t">값을 좁히는 코드</text><text x="422" y="314" class="s">assertion이 아니라 확인</text>
  <rect x="702" y="174" width="244" height="178" rx="24" class="ok"/>
  <text x="732" y="218" class="h">앱 내부 타입</text><text x="732" y="254" class="code">User</text><text x="732" y="284" class="t">좁혀진 계약</text><text x="732" y="314" class="s">UI는 작은 상태 공간만 다룸</text>
  <path class="line" d="M326 263 H392"/><path class="line" d="M636 263 H702"/>
  <rect x="110" y="456" width="286" height="134" rx="22" class="env"/>
  <text x="140" y="496" class="h">DOM / 환경 모델</text><text x="140" y="532" class="t">브라우저와 jsdom은 다르다</text><text x="140" y="562" class="s">타입 선언 ≠ 실제 API 존재</text>
  <rect x="456" y="456" width="286" height="134" rx="22" class="warn"/>
  <text x="486" y="496" class="h">테스트 경계</text><text x="486" y="532" class="t">타입은 테스트를 대체하지 않음</text><text x="486" y="562" class="s">분기 · 실패 · 환경 차이를 확인</text>
  <rect x="802" y="456" width="286" height="134" rx="22" class="perf"/>
  <text x="832" y="496" class="h">컴파일러 성능</text><text x="832" y="532" class="t">복잡한 타입도 비용이 있다</text><text x="832" y="562" class="s">재귀/분배 조건부 타입 점검</text>
  <path class="line" d="M254 456 C300 394 424 376 514 352"/><path class="line" d="M600 456 C628 402 716 378 824 352"/><path class="line" d="M946 456 C920 402 872 376 824 352"/>
</svg>
