<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">JavaScript Number mental model</title>
  <desc id="desc">A diagram showing JavaScript number as IEEE 754 double with sign, exponent, fraction, safe integer range, NaN, negative zero, Infinity, and BigInt as a separate path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <style>
      .title{font:700 42px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}
      .label{font:700 24px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#e5e7eb}
      .body{font:500 19px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#cbd5e1}
      .mono{font:600 19px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;fill:#bfdbfe}
      .small{font:500 16px ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#94a3b8}
      .card{fill:#111827;stroke:#334155;stroke-width:2;rx:28}
      .pill{fill:#0b1220;stroke:#475569;stroke-width:1.5;rx:18}
      .warn{fill:#1f1a12;stroke:#f59e0b;stroke-width:2;rx:20}
      .good{fill:#0f1f1d;stroke:#34d399;stroke-width:2;rx:20}
      .arrow{stroke:#60a5fa;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60a5fa"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="60" y="72" class="title">JavaScript Number: 하나의 타입, 여러 얼굴</text>
  <text x="60" y="112" class="body">대부분의 숫자는 IEEE 754 double이다. 그래서 정수처럼 보여도 항상 정수 모델로 생각하면 틀린다.</text>

  <rect x="60" y="160" width="520" height="170" class="card"/>
  <text x="90" y="205" class="label">Number</text>
  <text x="90" y="242" class="body">64-bit IEEE 754 double</text>
  <rect x="90" y="268" width="80" height="38" class="pill"/>
  <text x="112" y="293" class="mono">sign</text>
  <rect x="188" y="268" width="130" height="38" class="pill"/>
  <text x="212" y="293" class="mono">exponent</text>
  <rect x="336" y="268" width="190" height="38" class="pill"/>
  <text x="370" y="293" class="mono">fraction</text>

  <rect x="620" y="160" width="500" height="170" class="good"/>
  <text x="650" y="205" class="label">안전한 정수 범위</text>
  <text x="650" y="244" class="mono">±(2^53 - 1)</text>
  <text x="650" y="282" class="body">이 범위 밖에서는 서로 다른 정수가 같은 값처럼 보일 수 있다.</text>

  <path d="M580 245 C600 245 602 245 620 245" class="arrow"/>

  <rect x="60" y="380" width="330" height="190" class="warn"/>
  <text x="90" y="425" class="label">NaN</text>
  <text x="90" y="462" class="body">숫자 타입 안의 실패 신호</text>
  <text x="90" y="500" class="mono">NaN === NaN → false</text>
  <text x="90" y="536" class="mono">Object.is(NaN, NaN) → true</text>

  <rect x="435" y="380" width="330" height="190" class="warn"/>
  <text x="465" y="425" class="label">-0</text>
  <text x="465" y="462" class="body">0처럼 보이지만 부호가 남는다</text>
  <text x="465" y="500" class="mono">-0 === 0 → true</text>
  <text x="465" y="536" class="mono">Object.is(-0, 0) → false</text>

  <rect x="810" y="380" width="310" height="190" class="card"/>
  <text x="840" y="425" class="label">BigInt</text>
  <text x="840" y="462" class="body">정확한 큰 정수가 필요할 때</text>
  <text x="840" y="500" class="mono">9007199254740993n</text>
  <text x="840" y="536" class="small">Number와 섞어 계산하면 TypeError</text>

  <text x="60" y="640" class="small">리뷰 질문: 이 값은 계산용 숫자인가, 식별자/금액/카운터처럼 정확성이 중요한 값인가?</text>
</svg>
