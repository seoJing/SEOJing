<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">ESM live binding과 순환 의존성 다이어그램</title>
  <desc id="desc">세 모듈이 import/export로 연결되고, live binding은 값 복사가 아니라 export slot을 바라본다는 점을 설명하는 다이어그램</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f1e8" />
      <stop offset="1" stop-color="#efe3cf" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#47331d" flood-opacity="0.16" />
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155" />
    </marker>
    <style>
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #64748b; }
      .card-title { font: 700 22px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #111827; }
      .code { font: 500 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #1e293b; }
      .note { font: 600 17px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569; }
      .small { font: 500 15px -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #64748b; }
      .card { fill: rgba(255,255,255,0.82); stroke: rgba(148, 116, 79, 0.35); stroke-width: 1.5; filter: url(#shadow); }
      .slot { fill: #fff7ed; stroke: #fb923c; stroke-width: 2; }
      .import { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; }
      .danger { fill: #fef2f2; stroke: #f87171; stroke-width: 2; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .cycle { stroke: #dc2626; stroke-width: 3; fill: none; stroke-dasharray: 8 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="720" rx="36" fill="url(#bg)" />
  <text x="72" y="74" class="title">Module graph: import는 복사가 아니라 연결이다</text>
  <text x="72" y="108" class="subtitle">ESM live binding · circular dependency · dynamic import 리뷰 포인트</text>

  <rect x="78" y="168" width="300" height="250" rx="24" class="card" />
  <text x="108" y="212" class="card-title">counter.js</text>
  <rect x="108" y="240" width="230" height="64" rx="14" class="slot" />
  <text x="126" y="266" class="code">export let count</text>
  <text x="126" y="292" class="code">= 0</text>
  <text x="108" y="342" class="code">export function inc()</text>
  <text x="108" y="370" class="small">export slot을 소유한다</text>

  <rect x="450" y="168" width="300" height="250" rx="24" class="card" />
  <text x="480" y="212" class="card-title">view.js</text>
  <rect x="480" y="240" width="230" height="64" rx="14" class="import" />
  <text x="498" y="266" class="code">import { count }</text>
  <text x="498" y="292" class="code">from './counter'</text>
  <text x="480" y="342" class="code">render(count)</text>
  <text x="480" y="370" class="small">현재 slot 값을 읽는다</text>

  <rect x="822" y="168" width="300" height="250" rx="24" class="card" />
  <text x="852" y="212" class="card-title">route.js</text>
  <rect x="852" y="240" width="230" height="64" rx="14" class="import" />
  <text x="870" y="266" class="code">await import()</text>
  <text x="870" y="292" class="code">on demand</text>
  <text x="852" y="342" class="code">load heavy page</text>
  <text x="852" y="370" class="small">경계를 늦게 가져온다</text>

  <path class="line" d="M450 276 C420 276 408 276 378 276" />
  <path class="line" d="M822 276 C792 276 780 276 750 276" />
  <text x="397" y="258" class="note">live binding</text>
  <text x="765" y="258" class="note">split point</text>

  <rect x="122" y="492" width="420" height="116" rx="22" class="danger" />
  <text x="152" y="530" class="card-title">순환 의존성에서 볼 질문</text>
  <text x="152" y="564" class="note">초기화 전에 읽는 import가 있는가?</text>
  <text x="152" y="592" class="small">undefined / TDZ / 부분 초기화처럼 보일 수 있다</text>

  <rect x="660" y="492" width="420" height="116" rx="22" class="slot" />
  <text x="690" y="530" class="card-title">리뷰 기준</text>
  <text x="690" y="564" class="note">module graph가 기능 경계를 설명하는가?</text>
  <text x="690" y="592" class="small">default export 남용, side effect import, 순환 참조를 확인한다</text>

  <path class="cycle" d="M272 492 C288 452 372 446 430 470 C500 500 532 542 660 548" />
</svg>
