<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Trace evidence loop for agent workflows</title>
  <desc id="desc">A diagram showing user intent, source evidence, actions, artifacts, verification, and improvement candidate connected as a loop.</desc>
  <rect width="1200" height="720" fill="#f8f3e8"/>
  <rect x="80" y="72" width="1040" height="576" rx="28" fill="#fffaf0" stroke="#1e293b" stroke-width="4"/>
  <text x="600" y="132" text-anchor="middle" font-family="ui-serif, Georgia, serif" font-size="34" font-weight="700" fill="#111827">Trace as Evidence Loop</text>
  <text x="600" y="172" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#475569">not a console log, but a chain that changes the next run</text>

  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#1e293b"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif" filter="url(#shadow)">
    <g transform="translate(122 255)">
      <rect width="190" height="104" rx="18" fill="#fef3c7" stroke="#92400e" stroke-width="3"/>
      <text x="95" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#78350f">Intent</text>
      <text x="95" y="72" text-anchor="middle" font-size="15" fill="#78350f">request + success rule</text>
    </g>
    <g transform="translate(367 210)">
      <rect width="206" height="104" rx="18" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
      <text x="103" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">Evidence</text>
      <text x="103" y="72" text-anchor="middle" font-size="15" fill="#1e3a8a">sources + coordinates</text>
    </g>
    <g transform="translate(646 210)">
      <rect width="190" height="104" rx="18" fill="#dcfce7" stroke="#15803d" stroke-width="3"/>
      <text x="95" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#14532d">Action</text>
      <text x="95" y="72" text-anchor="middle" font-size="15" fill="#14532d">tool call + change</text>
    </g>
    <g transform="translate(902 255)">
      <rect width="190" height="104" rx="18" fill="#ede9fe" stroke="#6d28d9" stroke-width="3"/>
      <text x="95" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#4c1d95">Artifact</text>
      <text x="95" y="72" text-anchor="middle" font-size="15" fill="#4c1d95">file · URL · report</text>
    </g>
    <g transform="translate(646 455)">
      <rect width="190" height="104" rx="18" fill="#fee2e2" stroke="#b91c1c" stroke-width="3"/>
      <text x="95" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#7f1d1d">Verify</text>
      <text x="95" y="72" text-anchor="middle" font-size="15" fill="#7f1d1d">checks + gate</text>
    </g>
    <g transform="translate(357 455)">
      <rect width="226" height="104" rx="18" fill="#e0f2fe" stroke="#0369a1" stroke-width="3"/>
      <text x="113" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0c4a6e">Improve</text>
      <text x="113" y="72" text-anchor="middle" font-size="15" fill="#0c4a6e">skill · eval · next rule</text>
    </g>
  </g>

  <g fill="none" stroke="#1e293b" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)">
    <path d="M312 307 C335 287, 342 275, 367 262"/>
    <path d="M573 262 C601 249, 621 249, 646 262"/>
    <path d="M836 262 C865 270, 880 286, 902 307"/>
    <path d="M997 359 C993 424, 895 492, 836 507"/>
    <path d="M646 507 C623 510, 606 510, 583 507"/>
    <path d="M357 507 C254 478, 202 405, 217 359"/>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#334155">
    <text x="600" y="622" text-anchor="middle">trace = intent → evidence → action → artifact → verification → reusable learning</text>
  </g>
</svg>
